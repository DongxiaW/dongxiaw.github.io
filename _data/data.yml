# ----------------------------------------------------------------------
# Research interests (each thrust has a tagline + motivation)
# ----------------------------------------------------------------------
research:
  intro: |
    The **ATLAS Lab** (*AI for Trustworthy Learning And Science*) builds machine learning that is **trustworthy** —
    calibrated, auditable, and physics-grounded — and uses it to advance **science**, with a focus on biology and the
    spatiotemporal dynamics of the physical world. My research spans two intertwined thrusts:
  thrusts:
    - title: Trustworthy AI
      tagline: Calibrated, auditable, and physics-grounded models.
      body: |
        As AI moves into high-stakes scientific decisions, accuracy alone is not enough. Models must know what they
        don't know (**calibrated uncertainty**), expose *why* they decided (**auditability**), and respect known
        physical and biological laws (**physics-grounded inductive bias**). I develop probabilistic and generative
        methods — Bayesian deep learning, uncertainty quantification, and constrained generative modeling — that
        turn black-box predictions into reliable, accountable decisions.
    - title: AI for Science
      tagline: From molecular and cellular biology to the spatiotemporal dynamics of the world.
      body: |
        Scientific data are scarce, noisy, multi-fidelity, and structured across space and time. I build generative
        and Bayesian models that learn efficiently from such data to accelerate discovery — especially in **biology**,
        spanning molecule, protein, and material design, single-cell modeling, and biomedical imaging — and to build
        *world models* that capture how complex physical systems evolve across space and time, from fluid dynamics to
        the climate. I also take a
        **data-centric** view, curating open datasets and rigorous **benchmarks** that make progress in AI for science
        measurable and reproducible.

