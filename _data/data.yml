recruiting:
  intro: |
    **The ATLAS Lab at MBZUAI is recruiting!** I am looking for highly motivated **PhD students, master's students,
    postdocs, research assistants (RAs), and visiting students**, and I recruit from both the Department of Statistics
    and Data Science and the Department of Machine Learning. **PhD positions begin in Fall 2027**; postdoc, master's,
    RA, and visiting positions can begin as early as **Fall 2026**. I am especially interested in candidates working
    across these areas:
  areas:
    - title: Generative Modeling & Reinforcement Learning
      text: Diffusion- and flow-based generative models and reinforcement learning — core building blocks of modern machine learning.
    - title: Foundation Models & Agents
      text: Large language and vision–language models (LLMs/VLMs), multimodal reasoning, and agentic systems for science.
    - title: Probabilistic Machine Learning
      text: Bayesian inference, uncertainty quantification, sequential decision-making, and experimental design.
    - title: AI for Biology & Science
      text: Molecular, protein, and material design; single-cell modeling; biomedical imaging; time-series modeling; and spatiotemporal modeling (e.g., fluid dynamics, climate).
  apply: |
    If you would like to work with me, please email your CV, academic transcript, and a brief research statement to
    **Dongxia [dot] Wu [at] mbzuai [dot] ac [dot] ae**, using the subject line
    **[Your Name] — [Position] — [Research Direction(s)] — ATLAS Lab Application**. In your email, please note which of
    the four directions above best match your interests and why.
