# ----------------------------------------------------------------------
# Bio / about (rendered in the header, supports markdown links)
# ----------------------------------------------------------------------
bio: |
  I am a postdoctoral scholar at [Stanford University](https://www.stanford.edu/), advised by Prof. Emily B. Fox.
  In **Aug 2026** I will join [MBZUAI](https://mbzuai.ac.ae/) as a **tenure-track Assistant Professor**, jointly in the
  Department of Statistics and Data Science and the Department of Machine Learning, where I will lead the
  **ATLAS Lab** (*AI for Trustworthy Learning And Science*).

  I received my Ph.D. in Computer Science from [UC San Diego](https://ucsd.edu/) in 2025, advised by Prof. Rose Yu and
  Prof. Yi-An Ma, and my B.S. in Applied Mathematics, Physics, and Computer Science from
  [UW–Madison](https://www.wisc.edu/) in 2020.

  My research builds **trustworthy AI** — calibrated, auditable, and physics-grounded models — and applies it to
  **AI for science**, from molecular and cellular biology to the spatiotemporal dynamics of the physical world
  (toward scientific *world models*).

