<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ATLAS Lab logo">
  <defs>
    <linearGradient id="atlasA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1aa9a4"/>
      <stop offset="1" stop-color="#0a5f5e"/>
    </linearGradient>
  </defs>
  <!-- horizon / world arc -->
  <path d="M12 50.5 Q32 60 52 50.5" fill="none" stroke="#0e7c7b" stroke-width="3" stroke-linecap="round" opacity=".35"/>
  <!-- A / summit -->
  <path d="M16.5 50 L32 15.5 L47.5 50" fill="none" stroke="url(#atlasA)" stroke-width="5.6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- crossbar -->
  <path d="M24 37.5 H40" fill="none" stroke="#0e7c7b" stroke-width="4.4" stroke-linecap="round"/>
  <!-- summit node -->
  <circle cx="32" cy="13.5" r="4.3" fill="#1aa9a4"/>
</svg>
